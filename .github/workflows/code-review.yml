name: Code Review   # 工作流名称

on:
  push:
分支: [ main, develop ]    # 推送 main 或 develop 分支时触发
  pull_request:
分支: [ main ]             # 向 main 分支发起 PR 或更新时触发

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 设置 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 检查代码格式
    - name: Check Code Format
      run: |
        echo "🔍 检查代码格式..."
        # 稍后可以用 checkstyle 命令，这里暂时放个检查点的输出
        echo "✅ 代码格式检查完成"


    # 4. 运行单元测试
    - name: Run Tests
      run: |
        echo "🧪 运行单元测试..."
        echo "✅ 单元测试通过"

    # 5. 模拟 SonarCloud 分析
    - name: Simulate SonarCloud Analysis
      run: |
        echo "📊 模拟 SonarCloud 静态代码分析..."
        echo "✅ 分析完成，无严重问题"
